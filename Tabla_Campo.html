  <div>
    <h1>📋 Tabla Dinámica — Actividades de Campo</h1>
    <div class="sub">Registro semanal de actividades por empleado</div>
  </div>
</div>
<div class="filters">
  <div class="filter-group"><label>Semana</label><select id="fSemana"><option value="">Todas las semanas</option></select></div>
  <div class="filter-group"><label>Empleado</label><select id="fPersonal"><option value="">Todos los empleados</option></select></div>
  <div class="filter-group"><label>Actividad</label><select id="fActividad"><option value="">Todas las actividades</option></select></div>
  <div class="filter-group"><label>Sector</label><select id="fCuenta"><option value="">Todos</option></select></div>
  <div class="filter-group"><label>Lote</label><select id="fLote"><option value="">Todos los lotes</option></select></div>
  <div class="filter-group"><label>Buscar (obs.)</label><input type="text" id="fBuscar" placeholder="Ej: SUPERNOVA, VALVULAS…"></div>

    <button class="btn btn-secondary" onclick="resetFilters()">↺ Limpiar</button>
  </div>
</div>
<div class="view-tabs">
  <div class="tab active" onclick="switchView('detalle')">📄 Detalle</div>
  <div class="tab" onclick="switchView('pivotEmp')">👷 Pivot Empleado × Actividad</div>
  <div class="tab" onclick="switchView('pivotDia')">📅 Pivot Empleado × Día</div>
  <div class="tab" onclick="switchView('tarjetas')">🗂 Tarjetas por Empleado</div>

</div>
<div class="stats-bar" id="statsBar"></div>
<div id="viewDetalle" class="table-area">
  <table id="mainTable">
    <thead><tr>
      <th onclick="sortBy('semana')">Semana ↕</th>
      <th onclick="sortBy('fecha')">Fecha ↕</th>
      <th>Día</th>
      <th onclick="sortBy('personal')">Empleado ↕</th>
      <th>Sector</th>
      <th onclick="sortBy('actividad')">Actividad ↕</th>
      <th>Detalle</th>
      <th onclick="sortBy('lote')">Lote ↕</th>
      <th onclick="sortBy('hs')">HS ↕</th>
      <th onclick="sortBy('hs_extra')">HS Extra ↕</th>
      <th>Observaciones</th>
    </tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
<div id="viewPivotEmp" style="display:none" class="table-area"></div>
<div id="viewPivotDia" style="display:none" class="table-area"></div>
<div id="viewTarjetas" style="display:none"></div>
<div id="viewPivotLote" style="display:none" class="table-area"></div>

let filtered = [...RAW];
let sortCol = 'fecha', sortDir = 1;
let currentView = 'detalle';

function populateFilters() {
  const semanas   = [...new Set(RAW.map(r=>r.semana))].sort((a,b)=>RAW.find(x=>x.semana===a).semana_ord.localeCompare(RAW.find(x=>x.semana===b).semana_ord));
  const empleados = [...new Set(RAW.map(r=>r.personal))].sort();
  const actividades = [...new Set(RAW.map(r=>r.actividad))].sort();
  const cuentas   = [...new Set(RAW.map(r=>r.cuenta))].sort();
  const lotes     = [...new Set(RAW.map(r=>r.lote).filter(l=>l))].sort((a,b)=>{
    const na=parseInt(a.replace(/\D/g,'')), nb=parseInt(b.replace(/\D/g,''));
    return isNaN(na)||isNaN(nb) ? a.localeCompare(b) : na-nb;
  });
  const fill = (id, arr) => {
    const sel = document.getElementById(id);
    arr.forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
  };
  fill('fSemana', semanas); fill('fPersonal', empleados); fill('fActividad', actividades);
  fill('fCuenta', cuentas); fill('fLote', lotes);
}

function applyFilters() {
  const sem = document.getElementById('fSemana').value;
  const emp = document.getElementById('fPersonal').value;
  const act = document.getElementById('fActividad').value;
  const cta = document.getElementById('fCuenta').value;
  const lot = document.getElementById('fLote').value;
  const bus = document.getElementById('fBuscar').value.trim().toLowerCase();
  filtered = RAW.filter(r =>
    (!sem || r.semana===sem) && (!emp || r.personal===emp) &&
    (!act || r.actividad===act) && (!cta || r.cuenta===cta) &&
    (!lot || r.lote===lot) && (!bus || (r.obs+' '+r.subrubro).toLowerCase().includes(bus))
  );
  render();
}

function resetFilters() {
  ['fSemana','fPersonal','fActividad','fCuenta','fLote'].forEach(id => document.getElementById(id).value='');
  document.getElementById('fBuscar').value='';
  filtered = [...RAW]; render();
}

function sortBy(col) {
  if (sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; }
  render();
}

function switchView(v) {
  currentView = v;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['detalle','pivotEmp','pivotDia','tarjetas','pivotLote'][i]===v));
  document.getElementById('viewDetalle').style.display   = v==='detalle'   ? '' : 'none';
  document.getElementById('viewPivotEmp').style.display  = v==='pivotEmp'  ? '' : 'none';
  document.getElementById('viewPivotDia').style.display  = v==='pivotDia'  ? '' : 'none';
  document.getElementById('viewTarjetas').style.display  = v==='tarjetas'  ? '' : 'none';
  document.getElementById('viewPivotLote').style.display = v==='pivotLote' ? '' : 'none';
  render();
}

function cuentaBadge(c) {
  const cls = c==='CAMPO'?'badge-campo':c==='FABRICA'?'badge-fabrica':c==='MOV.STOCK.INSUMOS'?'badge-stock':'badge-vac';
  return `<span class="badge ${cls}">${c}</span>`;
}

function renderStats(data) {
  const empSet = new Set(data.filter(r=>r.cuenta!=='MOV.STOCK.INSUMOS').map(r=>r.personal));
  const totalHs = data.reduce((s,r)=>s+r.hs,0);
  const totalExtra = data.reduce((s,r)=>s+r.hs_extra,0);
  const semSet = new Set(data.map(r=>r.semana));
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="val">${data.length}</div><div class="lbl">Registros</div></div>
    <div class="stat-card"><div class="val">${empSet.size}</div><div class="lbl">Empleados</div></div>
    <div class="stat-card green"><div class="val">${totalHs}</div><div class="lbl">HS Normales</div></div>
    <div class="stat-card orange"><div class="val">${totalExtra}</div><div class="lbl">HS Extra</div></div>
    <div class="stat-card"><div class="val">${totalHs+totalExtra}</div><div class="lbl">Total HS</div></div>
    <div class="stat-card"><div class="val">${semSet.size}</div><div class="lbl">Semana(s)</div></div>`;
}

function renderDetalle(data) {
  const sorted = [...data].sort((a,b) => {
    let va=a[sortCol]??'', vb=b[sortCol]??'';
    if (typeof va==='number') return (va-vb)*sortDir;
    return String(va).localeCompare(String(vb))*sortDir;
  });
  const tbody = document.getElementById('tableBody');
  if (!sorted.length) { tbody.innerHTML=`<tr><td colspan="11" class="no-data">Sin resultados.</td></tr>`; return; }
  tbody.innerHTML = sorted.map((r,i) => `
    <tr class="${i%2===1?'alt':''}">
      <td>${r.semana}</td><td>${r.fecha}</td>
      <td style="text-align:center">${r.dia}</td>
      <td><b>${r.personal}</b></td>
      <td>${cuentaBadge(r.cuenta)}</td>
      <td>${r.actividad}</td>
      <td style="color:#5a7a9a;font-size:11px">${r.subrubro||'—'}</td>
      <td>${r.lote||'—'}</td>
      <td class="hs-num num">${r.hs||'—'}</td>
      <td class="hs-extra num">${r.hs_extra||'—'}</td>
      <td style="font-size:11px;color:#5a7a9a;max-width:220px">${r.obs||'—'}</td>
    </tr>`).join('');
}

function renderPivotEmp(data) {
  const empData = data.filter(r=>r.cuenta!=='MOV.STOCK.INSUMOS');
  const emps = [...new Set(empData.map(r=>r.personal))].sort();
  const acts = [...new Set(empData.map(r=>r.actividad))].sort();
  const map = {};
  emps.forEach(e => { map[e]={};  acts.forEach(a => map[e][a]=0); });
  empData.forEach(r => { if(map[r.personal]) map[r.personal][r.actividad]=(map[r.personal][r.actividad]||0)+r.hs+r.hs_extra; });
  let html = `<table class="pivot-table"><thead><tr><th class="row-header">Empleado</th>${acts.map(a=>`<th title="${a}">${a.length>18?a.slice(0,16)+'…':a}</th>`).join('')}<th>TOTAL</th></tr></thead><tbody>`;
  emps.forEach(e => {
    const rowTotal = acts.reduce((s,a)=>s+(map[e][a]||0),0);
    html += `<tr><td class="emp-name">${e}</td>${acts.map(a=>`<td class="pv-val${map[e][a]>0?' has-val':''}">${map[e][a]||'·'}</td>`).join('')}<td class="pv-total">${rowTotal||'·'}</td></tr>`;
  });
  html += `<tr class="total-row"><td class="emp-name">TOTAL</td>${acts.map(a=>`<td>${emps.reduce((s,e)=>s+(map[e][a]||0),0)||'·'}</td>`).join('')}<td>${emps.reduce((s,e)=>acts.reduce((ss,a)=>ss+(map[e][a]||0),s),0)}</td></tr>`;
  html += `</tbody></table>`;
  document.getElementById('viewPivotEmp').innerHTML = html;
}

function renderPivotDia(data) {
  const empData = data.filter(r=>r.cuenta!=='MOV.STOCK.INSUMOS');
  const emps = [...new Set(empData.map(r=>r.personal))].sort();
  const dias = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].filter(d=>empData.some(r=>r.dia===d));
  const map = {};
  emps.forEach(e => { map[e]={};  dias.forEach(d=>map[e][d]={acts:[],hs:0}); });
  empData.forEach(r => {
    if(map[r.personal]&&map[r.personal][r.dia]) {
      if(!map[r.personal][r.dia].acts.includes(r.actividad)) map[r.personal][r.dia].acts.push(r.actividad);
      map[r.personal][r.dia].hs += r.hs+r.hs_extra;
    }
  });
  let html = `<table class="pivot-table"><thead><tr><th class="row-header">Empleado</th>${dias.map(d=>`<th>${d}</th>`).join('')}<th>TOTAL HS</th></tr></thead><tbody>`;
  emps.forEach(e => {
    const rowTotal = dias.reduce((s,d)=>s+map[e][d].hs,0);
    html += `<tr><td class="emp-name">${e}</td>${dias.map(d=>{
      const cell=map[e][d];
      const actStr=cell.acts.slice(0,2).join(', ')+(cell.acts.length>2?'…':'');
      return `<td class="pv-val${cell.hs>0?' has-val':''}" title="${cell.acts.join(' | ')}">${cell.hs>0?`<div style="font-size:10px;color:#333">${actStr}</div><div style="font-size:11px;color:#1F4E79;font-weight:700">${cell.hs} hs</div>`:'·'}</td>`;
    }).join('')}<td class="pv-total">${rowTotal||'·'}</td></tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('viewPivotDia').innerHTML = html;
}

function renderTarjetas(data) {
  const empData = data.filter(r=>r.cuenta!=='MOV.STOCK.INSUMOS');
  const emps = [...new Set(empData.map(r=>r.personal))].sort();
  if (!emps.length) { document.getElementById('viewTarjetas').innerHTML=`<div class="empty-msg">Sin datos.</div>`; return; }
  let html = '<div class="week-grid">';
  emps.forEach(e => {
    const rows = empData.filter(r=>r.personal===e);
    const totalHs = rows.reduce((s,r)=>s+r.hs+r.hs_extra,0);
    html += `<div class="emp-card"><div class="emp-card-header">${e}<span class="hs-badge">${totalHs} hs</span></div><div class="emp-card-body">
      ${rows.map(r=>`<div class="act-row"><div><div class="act-name">${r.actividad}${r.subrubro?` <span style="color:#888;font-size:11px">· ${r.subrubro}</span>`:''}</div>${r.lote?`<div class="act-lote">${r.lote}</div>`:''}</div>
      <div style="text-align:right">${r.hs>0?`<div class="act-hs">${r.hs} hs${r.hs_extra>0?' <span style="color:#833C00">+'+r.hs_extra+'</span>':''}</div>`:''}<div style="color:#aaa;font-size:10px">${r.dia} ${r.fecha}</div></div></div>`).join('')}
    </div></div>`;
  });
  html += '</div>';
  document.getElementById('viewTarjetas').innerHTML = html;
}

function renderPivotLote(data) {
  const empData = data.filter(r=>r.cuenta!=='MOV.STOCK.INSUMOS' && r.lote);
  const acts  = [...new Set(empData.map(r=>r.actividad))].sort();
  const lotes = [...new Set(empData.map(r=>r.lote))].filter(l=>l).sort((a,b)=>{
    const na=parseInt(a.replace(/\D/g,'')), nb=parseInt(b.replace(/\D/g,''));
    return isNaN(na)||isNaN(nb) ? a.localeCompare(b) : na-nb;
  });
  if (!lotes.length) { document.getElementById('viewPivotLote').innerHTML='<div class="empty-msg">Sin datos con lote asignado.</div>'; return; }
  const map = {};
  acts.forEach(a => { map[a]={};  lotes.forEach(l => map[a][l]={hs:0,emps:new Set()}); });
  empData.forEach(r => {
    if(map[r.actividad]&&map[r.actividad][r.lote]!==undefined) {
      map[r.actividad][r.lote].hs += r.hs+r.hs_extra;
      map[r.actividad][r.lote].emps.add(r.personal);
    }
  });
  const loteTotals = {};
  lotes.forEach(l => loteTotals[l]=acts.reduce((s,a)=>s+(map[a][l]?.hs||0),0));
  const actTotals = {};
  acts.forEach(a => actTotals[a]=lotes.reduce((s,l)=>s+(map[a][l]?.hs||0),0));
  const grandTotal = lotes.reduce((s,l)=>s+loteTotals[l],0);
  let html = `<table class="pivot-table"><thead><tr><th class="row-header">Actividad</th>${lotes.map(l=>`<th>${l}</th>`).join('')}<th>TOTAL HS</th></tr></thead><tbody>`;
  acts.forEach(a => {
    html += `<tr><td class="emp-name" style="font-size:12px">${a}</td>${lotes.map(l=>{
      const cell=map[a][l]; const hs=cell?.hs||0; const emps=cell?.emps?[...cell.emps]:[];
      return `<td class="pv-val${hs>0?' has-val':''}" title="${emps.join(', ')}">${hs>0?`<div style="font-weight:700;color:#1F4E79">${hs} hs</div><div style="font-size:10px;color:#5a7a9a">${emps.length} empl.</div>`:'·'}</td>`;
    }).join('')}<td class="pv-total">${actTotals[a]>0?actTotals[a]+' hs':'·'}</td></tr>`;
  });
  html += `<tr class="total-row"><td class="emp-name">TOTAL</td>${lotes.map(l=>`<td>${loteTotals[l]>0?loteTotals[l]+' hs':'·'}</td>`).join('')}<td>${grandTotal} hs</td></tr>`;
  html += `</tbody></table><p style="margin-top:10px;font-size:11px;color:#5a7a9a;padding:0 4px">💡 Pasá el cursor sobre cada celda para ver los empleados.</p>`;
  document.getElementById('viewPivotLote').innerHTML = html;
}

function render() {
  renderStats(filtered);
  if (currentView==='detalle')    renderDetalle(filtered);
  else if (currentView==='pivotEmp')  renderPivotEmp(filtered);
  else if (currentView==='pivotDia')  renderPivotDia(filtered);
  else if (currentView==='tarjetas')  renderTarjetas(filtered);
  else if (currentView==='pivotLote') renderPivotLote(filtered);
}

populateFilters();
render();
</script>
</body>
</html>
